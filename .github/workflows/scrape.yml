name: Daily Scrape

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC = 06:00 São Paulo (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scrape.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily wishlist scrape"
          file_pattern: "items.json data.js"
